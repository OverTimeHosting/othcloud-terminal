name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: "Build & upload the full Windows x64 desktop package (~45 min)"
        type: boolean
        default: false
      package_linux_reh:
        description: "Build & upload the Linux x64 remote server (REH) for remote-SSH (~30 min)"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules (root + build only, for type-check)
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
          key: nm-typecheck-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', '.nvmrc') }}

      - name: Install root + build deps only (skip recursive postinstall)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          VSCODE_SKIP_NODE_VERSION_CHECK: "1"
        run: |
          npm ci --ignore-scripts --no-audit --no-fund --prefer-offline
          npm --prefix build ci --ignore-scripts --no-audit --no-fund --prefer-offline

      - name: Type-check (tsgo, fast)
        run: npm run compile-check-ts-native

      - name: Validate layers
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run valid-layers-check

  package:
    name: Package Windows x64
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.package)
    needs: compile
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            build/vite/node_modules
            extensions/node_modules
            extensions/*/node_modules
            extensions/*/server/node_modules
            remote/node_modules
            remote/web/node_modules
            test/*/node_modules
            .vscode/extensions/*/node_modules
          key: nm-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'build/vite/package-lock.json', 'extensions/**/package-lock.json', 'remote/**/package-lock.json', 'test/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.nvmrc') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          npm_command: "ci --prefer-offline --no-audit --no-fund"
          npm_config_prefer_offline: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_jobs: "max"
          # Lifts GitHub anonymous API rate limit (60/hr/IP) to the
          # authenticated 5000/hr quota — required for @vscode/ripgrep's
          # postinstall, which 403s otherwise.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Electron and built-in extensions
        uses: actions/cache@v4
        with:
          path: |
            .build/electron
            .build/builtInExtensions
          key: build-deps-${{ runner.os }}-x64-${{ hashFiles('.npmrc', 'product.json', 'cgmanifest.json') }}
          restore-keys: |
            build-deps-${{ runner.os }}-x64-

      - name: Download Electron and built-in extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node build/lib/electron.ts
          node build/lib/builtInExtensions.ts

      - name: Build app (vscode-win32-x64-min)
        run: npm run gulp vscode-win32-x64-min

      - name: Copy inno_updater.exe + vcruntime140.dll into the app's tools folder
        run: npm run gulp vscode-win32-x64-inno-updater

      - name: Build installer (vscode-win32-x64-user-setup)
        run: npm run gulp vscode-win32-x64-user-setup

      - name: Stage build outputs into the repo (for upload-artifact)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .build/upload | Out-Null
          $appSrc = Resolve-Path ../VSCode-win32-x64
          Copy-Item -Recurse -Force $appSrc .build/upload/VSCode-win32-x64
          Copy-Item -Force .build/win32-x64/user-setup/*.exe .build/upload/

      - name: Upload unzipped Othcloud Terminal app
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-win32-x64
          path: .build/upload/VSCode-win32-x64
          if-no-files-found: error
          retention-days: 14

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-win32-x64-user-setup
          path: .build/upload/*.exe
          if-no-files-found: error
          retention-days: 14

  package-linux-reh:
    name: Package Linux x64 Remote Server (REH)
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.package_linux_reh)
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
      # Skip the TS->TS mangler (private-field renaming, size optimization only).
      # ubuntu-latest has ~7GB RAM; mangler peaks add ~3GB on top of TS and have
      # been OOM-killing the runner ("hosted runner lost communication").
      VSCODE_NO_MANGLE: "1"
      # Match heap to actual runner RAM; the default `npm run gulp` script asks
      # for 8192 which exceeds physical memory.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Add 8 GB swap (prevents OOM during compile)
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbfile-dev libsecret-1-dev libkrb5-dev libx11-dev \
            libxkbcommon-dev fakeroot rpm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            build/vite/node_modules
            extensions/node_modules
            extensions/*/node_modules
            extensions/*/server/node_modules
            remote/node_modules
            remote/web/node_modules
            test/*/node_modules
            .vscode/extensions/*/node_modules
          key: nm-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'build/vite/package-lock.json', 'extensions/**/package-lock.json', 'remote/**/package-lock.json', 'test/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.nvmrc') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          npm_command: "ci --prefer-offline --no-audit --no-fund"
          npm_config_prefer_offline: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_jobs: "max"
          # Lifts GitHub anonymous API rate limit (60/hr/IP) to the
          # authenticated 5000/hr quota — required for @vscode/ripgrep's
          # postinstall, which 403s otherwise.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache built-in extensions
        uses: actions/cache@v4
        with:
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('product.json') }}
          restore-keys: |
            builtin-extensions-

      - name: Download built-in extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build/lib/builtInExtensions.ts

      - name: Build remote server (vscode-reh-linux-x64-min)
        run: npm run gulp vscode-reh-linux-x64-min

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Stage build output into the repo (gulp emits it to ../vscode-reh-linux-x64)
        run: |
          mkdir -p .build/upload
          cp -r ../vscode-reh-linux-x64 .build/upload/vscode-reh-linux-x64
          tar -czf ".build/upload/othcloud-terminal-reh-linux-x64-${{ steps.ver.outputs.version }}.tar.gz" \
            -C .build/upload/vscode-reh-linux-x64 .
          ls -la .build/upload

      - name: Upload Linux REH server (raw folder)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-server-linux-x64
          path: .build/upload/vscode-reh-linux-x64
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux REH server (.tar.gz for remote-SSH)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-reh-linux-x64-${{ steps.ver.outputs.version }}.tar.gz
          path: .build/upload/othcloud-terminal-reh-linux-x64-${{ steps.ver.outputs.version }}.tar.gz
          if-no-files-found: error
          retention-days: 7
