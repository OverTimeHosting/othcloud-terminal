name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: "Build & upload the full Windows x64 desktop package (~45 min)"
        type: boolean
        default: false
      package_linux_reh:
        description: "Build & upload the Linux x64 remote server (REH) for remote-SSH (~30 min)"
        type: boolean
        default: false
      package_linux_desktop:
        description: "Build & upload the Linux x64 desktop app + .deb installer (~40 min)"
        type: boolean
        default: false
      release:
        description: "Publish artifacts to a GitHub Release (requires package and/or package_linux_reh)"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Silence the "Node.js 20 actions are deprecated" warnings on every job by
  # opting all third-party JS actions (checkout, cache, setup-node, setup-python)
  # into the Node 24 runtime ahead of GitHub's June 2026 default flip.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bump-version:
    name: Bump patch version
    # Only auto-bump on push to main. Skip if the head commit is itself the
    # bump commit (avoids an infinite loop).
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version + tag
        id: bump
        run: |
          new_version=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [maj, min, patch] = pkg.version.split('.').map(Number);
            pkg.version = [maj, min, patch + 1].join('.');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(pkg.version);
          ")
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore(release): v${new_version} [skip ci]"
          git tag -a "v${new_version}" -m "Release v${new_version}"
          git push origin HEAD:main
          git push origin "v${new_version}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  compile:
    name: Compile (PR fast-fail)
    runs-on: windows-latest
    timeout-minutes: 30
    # PR-only fast-fail: the package jobs do their own compile, so on push-to-main
    # this job is pure waste. Skipping it saves ~30 min off the critical path.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the bump commit when one was made. Falls back to the PR head
          # otherwise (sha is the empty string when bump-version was skipped).
          ref: ${{ needs.bump-version.outputs.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules (root + build only, for type-check)
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
          key: nm-typecheck-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', '.nvmrc') }}

      - name: Install root + build deps only (skip recursive postinstall)
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          VSCODE_SKIP_NODE_VERSION_CHECK: "1"
        run: |
          npm ci --ignore-scripts --no-audit --no-fund --prefer-offline
          npm --prefix build ci --ignore-scripts --no-audit --no-fund --prefer-offline

      - name: Type-check (tsgo, fast)
        run: npm run compile-check-ts-native

      - name: Validate layers
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run valid-layers-check

  package:
    name: Package Windows x64
    # Run on every push to main (after bump) and on opt-in workflow_dispatch.
    if: |
      always() &&
      (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.package)
      )
    needs: [bump-version]
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
      # Skip the TS->TS mangler (private-field renaming, ~5% size win for ~10 min
      # of build time). Not worth it for a fork.
      VSCODE_NO_MANGLE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            build/vite/node_modules
            extensions/node_modules
            extensions/*/node_modules
            extensions/*/server/node_modules
            remote/node_modules
            remote/web/node_modules
            test/*/node_modules
            .vscode/extensions/*/node_modules
          key: nm-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'build/vite/package-lock.json', 'extensions/**/package-lock.json', 'remote/**/package-lock.json', 'test/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.nvmrc') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          npm_command: "ci --prefer-offline --no-audit --no-fund"
          npm_config_prefer_offline: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_jobs: "max"
          # Lifts GitHub anonymous API rate limit (60/hr/IP) to the
          # authenticated 5000/hr quota — required for @vscode/ripgrep's
          # postinstall, which 403s otherwise.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Electron and built-in extensions
        uses: actions/cache@v4
        with:
          path: |
            .build/electron
            .build/builtInExtensions
          key: build-deps-${{ runner.os }}-x64-${{ hashFiles('.npmrc', 'product.json', 'cgmanifest.json') }}
          restore-keys: |
            build-deps-${{ runner.os }}-x64-

      - name: Download Electron and built-in extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node build/lib/electron.ts
          node build/lib/builtInExtensions.ts

      - name: Build app (vscode-win32-x64-min)
        run: npm run gulp vscode-win32-x64-min

      - name: Copy inno_updater.exe + vcruntime140.dll into the app's tools folder
        run: npm run gulp vscode-win32-x64-inno-updater

      - name: Build installer (vscode-win32-x64-user-setup)
        run: npm run gulp vscode-win32-x64-user-setup

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Stage build outputs into the repo (for upload-artifact)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .build/upload | Out-Null
          $appSrc = Resolve-Path ../VSCode-win32-x64
          Copy-Item -Recurse -Force $appSrc .build/upload/VSCode-win32-x64
          # Rename installer to a stable, version-pinned name for releases
          $installer = Get-ChildItem .build/win32-x64/user-setup/*.exe | Select-Object -First 1
          $stable = "othcloud-terminal-${{ steps.ver.outputs.version }}-win32-x64-user-setup.exe"
          Copy-Item -Force $installer.FullName ".build/upload/$stable"

      - name: Upload unzipped Othcloud Terminal app
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-win32-x64
          path: .build/upload/VSCode-win32-x64
          if-no-files-found: error
          retention-days: 14

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-win32-x64-user-setup
          path: .build/upload/othcloud-terminal-*-win32-x64-user-setup.exe
          if-no-files-found: error
          retention-days: 14

  package-linux-reh:
    name: Package Linux x64 Remote Server (REH)
    if: |
      always() &&
      (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.package_linux_reh)
      )
    needs: [bump-version]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
      # Skip the TS->TS mangler (private-field renaming, size optimization only).
      # ubuntu-latest has ~7GB RAM; mangler peaks add ~3GB on top of TS and have
      # been OOM-killing the runner ("hosted runner lost communication").
      VSCODE_NO_MANGLE: "1"
      # Match heap to actual runner RAM; the default `npm run gulp` script asks
      # for 8192 which exceeds physical memory.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha || github.sha }}

      - name: Add 8 GB swap (prevents OOM during compile)
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbfile-dev libsecret-1-dev libkrb5-dev libx11-dev \
            libxkbcommon-dev fakeroot rpm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            build/vite/node_modules
            extensions/node_modules
            extensions/*/node_modules
            extensions/*/server/node_modules
            remote/node_modules
            remote/web/node_modules
            test/*/node_modules
            .vscode/extensions/*/node_modules
          key: nm-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'build/vite/package-lock.json', 'extensions/**/package-lock.json', 'remote/**/package-lock.json', 'test/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.nvmrc') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          npm_command: "ci --prefer-offline --no-audit --no-fund"
          npm_config_prefer_offline: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_jobs: "max"
          # Lifts GitHub anonymous API rate limit (60/hr/IP) to the
          # authenticated 5000/hr quota — required for @vscode/ripgrep's
          # postinstall, which 403s otherwise.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache built-in extensions
        uses: actions/cache@v4
        with:
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('product.json') }}
          restore-keys: |
            builtin-extensions-

      - name: Download built-in extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build/lib/builtInExtensions.ts

      - name: Build remote server (vscode-reh-linux-x64-min)
        run: npm run gulp vscode-reh-linux-x64-min

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Stage build output into the repo (gulp emits it to ../vscode-reh-linux-x64)
        run: |
          mkdir -p .build/upload
          cp -r ../vscode-reh-linux-x64 .build/upload/vscode-reh-linux-x64
          # Stable filename pattern consumed by product.json's serverDownloadUrlTemplate
          tar -czf ".build/upload/othcloud-terminal-server-linux-x64-${{ steps.ver.outputs.version }}.tar.gz" \
            -C .build/upload/vscode-reh-linux-x64 .
          ls -la .build/upload

      - name: Upload Linux REH server (raw folder)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-server-linux-x64
          path: .build/upload/vscode-reh-linux-x64
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux REH server (.tar.gz for remote-SSH)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-server-linux-x64-${{ steps.ver.outputs.version }}.tar.gz
          path: .build/upload/othcloud-terminal-server-linux-x64-${{ steps.ver.outputs.version }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  package-linux-desktop:
    name: Package Linux x64 Desktop (.deb)
    if: |
      always() &&
      (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.package_linux_desktop)
      )
    needs: [bump-version]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
      VSCODE_NO_MANGLE: "1"
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha || github.sha }}

      - name: Add 8 GB swap (prevents OOM during compile)
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            build/vite/package-lock.json
            extensions/**/package-lock.json
            remote/**/package-lock.json
            test/**/package-lock.json
            .vscode/extensions/**/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build deps (incl. dpkg + fakeroot for .deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbfile-dev libsecret-1-dev libkrb5-dev libx11-dev \
            libxkbcommon-dev fakeroot rpm dpkg-dev

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            build/node_modules
            build/vite/node_modules
            extensions/node_modules
            extensions/*/node_modules
            extensions/*/server/node_modules
            remote/node_modules
            remote/web/node_modules
            test/*/node_modules
            .vscode/extensions/*/node_modules
          key: nm-${{ runner.os }}-x64-${{ hashFiles('package-lock.json', 'build/package-lock.json', 'build/vite/package-lock.json', 'extensions/**/package-lock.json', 'remote/**/package-lock.json', 'test/**/package-lock.json', '.vscode/extensions/**/package-lock.json', '.nvmrc') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        env:
          npm_config_prefer_offline: "true"
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_jobs: "max"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Electron and built-in extensions
        uses: actions/cache@v4
        with:
          path: |
            .build/electron
            .build/builtInExtensions
          key: build-deps-linux-x64-${{ hashFiles('.npmrc', 'product.json', 'cgmanifest.json') }}
          restore-keys: |
            build-deps-linux-x64-

      - name: Download Electron and built-in extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node build/lib/electron.ts
          node build/lib/builtInExtensions.ts

      - name: Build Linux desktop app (vscode-linux-x64-min)
        run: npm run gulp vscode-linux-x64-min

      - name: Build .deb package
        run: |
          npm run gulp vscode-linux-x64-prepare-deb
          npm run gulp vscode-linux-x64-build-deb

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Stage build outputs (rename .deb to a stable, version-pinned name)
        run: |
          mkdir -p .build/upload
          # Locate the produced .deb (gulp emits it under .build/linux/deb/<arch>/deb/)
          deb_src=$(find .build/linux/deb -name '*.deb' -print -quit)
          if [ -z "$deb_src" ]; then
            echo "No .deb file produced!" >&2
            exit 1
          fi
          stable_name="othcloud-terminal_${{ steps.ver.outputs.version }}_amd64.deb"
          cp "$deb_src" ".build/upload/${stable_name}"
          # Also stage the unzipped desktop folder
          cp -r ../VSCode-linux-x64 .build/upload/VSCode-linux-x64
          ls -la .build/upload

      - name: Upload Linux desktop app (raw folder)
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-linux-x64
          path: .build/upload/VSCode-linux-x64
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux .deb installer
        uses: actions/upload-artifact@v4
        with:
          name: othcloud-terminal-linux-x64-deb
          path: .build/upload/othcloud-terminal_*_amd64.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [bump-version, package, package-linux-reh, package-linux-desktop]
    if: |
      always() &&
      needs.bump-version.result == 'success' &&
      needs.package.result == 'success' &&
      needs.package-linux-reh.result == 'success' &&
      needs.package-linux-desktop.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.release)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: othcloud-terminal-win32-x64-user-setup
          path: ./release-assets

      - name: Download Linux REH tarball (for SSH)
        uses: actions/download-artifact@v4
        with:
          name: othcloud-terminal-server-linux-x64-${{ needs.bump-version.outputs.version }}.tar.gz
          path: ./release-assets

      - name: Download Linux desktop .deb
        uses: actions/download-artifact@v4
        with:
          name: othcloud-terminal-linux-x64-deb
          path: ./release-assets

      - name: List release assets
        run: ls -la ./release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.bump-version.outputs.tag }}"
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "Othcloud Terminal ${{ needs.bump-version.outputs.version }}" \
            --notes "Automated release built from commit ${{ needs.bump-version.outputs.sha }}.

          ## Downloads
          - **Windows desktop installer:** \`othcloud-terminal-${{ needs.bump-version.outputs.version }}-win32-x64-user-setup.exe\`
          - **Linux desktop (.deb):** \`othcloud-terminal_${{ needs.bump-version.outputs.version }}_amd64.deb\`
          - **Linux remote server (used by Remote-SSH):** \`othcloud-terminal-server-linux-x64-${{ needs.bump-version.outputs.version }}.tar.gz\`
          " \
            ./release-assets/*
